<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP Chonomètre</title>
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/css/bootstrap-icons.css">
    <link rel="stylesheet" href="./assets/css/chrono.css">
</head>
<body>
    <div class="container">
        <div class="chrono-div">
            <div class="card">
                <div class="card-header">
                    <h1>
                        <i class="bi bi-hourglass-top"></i>
                        Top Chrono
                        <i class="bi bi-hourglass-split"></i>
                    </h1>
                </div>

                <div class="card-body p-2">
                    <div class="temps">
                        <span id="chronoId">00 : 00 : 00 : 00</span>
                    </div>
                </div>

                <div class="card-footer">
                    <button type="button" id="startId" class="btn btn-outline-success">
                        <i class="bi bi-skip-start-fill"></i> Start
                    </button>

                    <button type="button" id="stopId" class="btn btn-outline-warning">
                        <i class="bi bi-stop-fill"></i> Stop
                    </button>

                    <button type="button" id="resetId" class="btn btn-outline-danger">
                        <i class="bi bi-arrow-clockwise"></i> Reset
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/js/chrono.js"></script>
</body>
</html>
